<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNG CAFE</title>
<link rel="stylesheet" href="test.css">
</head>

<body>

<header>
<h1>TNG CAFE</h1>
<p>心安らぐ一杯をあなたに</p>

<nav>
<a href="#about">About Us</a>
<a href="#menu">Menu</a>
<a href="#contact">Contact</a>
</nav>
</header>

<main>

<section id="about">
<h2>About Us</h2>
<p>
TNGCafeは自然の香りに包まれたリラックス空間を提供しています。<br>
自家焙煎コーヒーと手作りスイーツで、穏やかな時間をお過ごしください。
</p>
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600" alt="カフェ">
</section>

<section id="menu">
<h2>Menu</h2>

<div class="menu-list">

<div class="card">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300">
<h3>コーヒー</h3>
<p>ブレンドコーヒー</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=300">
<h3>ケーキ</h3>
<p>ベイクドチーズケーキ</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=300">
<h3>ラテ</h3>
<p>カフェラテ</p>
</div>

</div>
</section>

<section id="contact">
<h2>Contact</h2>

<form>
<label for="name">お名前</label>
<input type="text" id="name" placeholder="お名前">

<label for="email">メールアドレス</label>
<input type="email" id="email" placeholder="メールアドレス">

<label for="message">お問い合わせ内容</label>
<textarea id="message" placeholder="お問い合わせ内容"></textarea>

<button type="submit">送信</button>
</form>

</section>

</main>

<footer>
<p>© 2025 TNG Cafe</p>
</footer>

</body>
</html>
